<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Webpack Template</title>

      rel="stylesheet"

  <body>
    <div id="app"></div>

    <div class="search-container">
      <form>
        <input
          type="text"
          placeholder="Search.."
          name="search"
          id="location-input"
        />
        <button type="submit" id="location-btn">
          <i class="fa fa-search"></i>
        </button>
      </form>
    </div>

    <div class="weatherWidget"></div>

    <div class="summary">
      <p id="current-conditions"></p>
    </div>

    <div class="days">
      
    </div>
  </body>
