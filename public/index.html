<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Webpack Template</title>
    <!-- <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css"
    /> -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
  </head>
  <body>
    <div class="container">
      <div id="app"></div>

      <div class="search-container">
        <form>
          <input
            type="text"
            placeholder="Search.."
            name="search"
            id="location-input"
          />
          <button type="submit" id="location-btn">
            <i class="fa fa-search"></i>
          </button>
        </form>
      </div>

      <div class="weatherWidget"></div>

      <div class="weather-details">
        <p></p>
      </div>
    </div>

    <div class="forecast">
      
    </div>
    <!-- Templates -->
    <template id="template-weather-details">
      <div class="weather-details__row">
        <div class="weather-details__date">Date</div>
        <div class="weather-details__temp">Highest/Lowest tempreture</div>
        <div class="weather-details__phases">Phases of the day</div>
        <div class="weather-details__rain">Chance of rain</div>
      </div>
    </template>
  </body>
</html>
